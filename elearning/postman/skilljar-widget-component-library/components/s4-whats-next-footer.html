<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>What's Next Footer</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --orange: #FF6C37;
      --orange-light: #FF8C5A;
      --orange-pale: #FFF0EB;
      --ink: #1A1612;
      --ink-mid: #4A3F38;
      --ink-light: #8C7B72;
      --rule: #E8DDD6;
      --white: #FFFFFF;
      --card-shadow: 0 2px 12px rgba(26,22,18,0.08), 0 1px 3px rgba(26,22,18,0.06);
    }
    * { box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; padding: 2rem; background: #f8f4f0; margin: 0; color: var(--ink); }

    .whats-next {
      background: var(--ink);
      border-radius: 16px;
      padding: 1.75rem 2rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      max-width: 600px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(26,22,18,0.2);
      text-decoration: none;
    }
    .whats-next:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(26,22,18,0.3); }
    .whats-next:hover .arrow-icon { transform: translateX(5px); }

    .next-icon-box {
      width: 52px; height: 52px; background: var(--orange); border-radius: 12px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .arrow-icon { font-size: 1.4rem; color: white; transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); display: block; }

    .next-content { flex: 1; }
    .next-label { font-family: 'Syne', sans-serif; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--orange); margin-bottom: 0.3rem; }
    .next-title { font-family: 'Syne', sans-serif; font-size: 1.05rem; font-weight: 800; color: white; margin: 0; }
    .next-subtitle { font-size: 0.83rem; color: rgba(255,255,255,0.45); margin-top: 0.2rem; }

    .next-chevron { color: rgba(255,255,255,0.25); font-size: 1.1rem; transition: color 0.2s; }
    .whats-next:hover .next-chevron { color: rgba(255,255,255,0.6); }
  </style>
</head>
<body>

  <div class="whats-next">
    <div class="next-icon-box">
      <span class="arrow-icon">→</span>
    </div>
    <div class="next-content">
      <div class="next-label">Up Next</div>
      <div class="next-title">Module 2: Building Your First Tool</div>
      <div class="next-subtitle">5 lessons · ~25 min</div>
    </div>
    <span class="next-chevron">›</span>
  </div>

</body>
</html>
