<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Checklist</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --orange: #FF6C37;
      --orange-light: #FF8C5A;
      --orange-pale: #FFF0EB;
      --ink: #1A1612;
      --ink-mid: #4A3F38;
      --ink-light: #8C7B72;
      --rule: #E8DDD6;
      --white: #FFFFFF;
      --green: #2D9E6B;
      --green-pale: #EAF7F1;
      --card-shadow: 0 2px 12px rgba(26,22,18,0.08), 0 1px 3px rgba(26,22,18,0.06);
    }
    * { box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; padding: 2rem; background: #f8f4f0; margin: 0; color: var(--ink); }

    .checklist-wrap { max-width: 560px; margin: 0 auto; }

    .progress-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.5rem; }
    .progress-label { font-family: 'Syne', sans-serif; font-size: 0.75rem; font-weight: 700; color: var(--ink-light); text-transform: uppercase; letter-spacing: 0.06em; }
    .progress-count { font-family: 'Syne', sans-serif; font-size: 0.85rem; font-weight: 700; color: var(--orange); }
    .progress-track { height: 6px; background: var(--rule); border-radius: 3px; margin-bottom: 1.5rem; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--orange); border-radius: 3px; transition: width 0.4s cubic-bezier(0.4,0,0.2,1); }

    .checklist { display: flex; flex-direction: column; gap: 0.5rem; }

    .check-row {
      background: white; border-radius: 12px; padding: 1rem 1.25rem; display: flex; align-items: center;
      gap: 1rem; cursor: pointer; box-shadow: var(--card-shadow); border: 2px solid transparent;
      transition: border-color 0.2s, background 0.25s; user-select: none;
    }
    .check-row:hover { border-color: var(--rule); }
    .check-row.checked { background: var(--green-pale); border-color: var(--green); }

    .check-box {
      width: 24px; height: 24px; border-radius: 6px; border: 2px solid var(--rule);
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, border-color 0.2s;
    }
    .check-row.checked .check-box { background: var(--green); border-color: var(--green); }
    .check-mark { color: white; font-size: 0.75rem; font-weight: 700; opacity: 0; transition: opacity 0.2s; }
    .check-row.checked .check-mark { opacity: 1; }

    .check-content { flex: 1; }
    .check-title { font-family: 'Syne', sans-serif; font-size: 0.92rem; font-weight: 700; color: var(--ink); transition: color 0.2s; }
    .check-row.checked .check-title { color: var(--green); text-decoration: line-through; text-decoration-color: rgba(45,158,107,0.4); }
    .check-desc { font-size: 0.82rem; color: var(--ink-light); margin-top: 0.15rem; transition: color 0.2s; }
    .check-row.checked .check-desc { color: rgba(45,158,107,0.6); }

    .check-badge {
      font-family: 'Syne', sans-serif; font-size: 0.68rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.05em; padding: 3px 8px; border-radius: 10px; flex-shrink: 0;
    }
    .badge-req { background: var(--orange-pale); color: var(--orange); }
    .badge-opt { background: #f0f0f0; color: var(--ink-light); }
    .check-row.checked .badge-req { background: var(--green-pale); color: var(--green); }

    /* Win state */
    .win-card {
      background: var(--green); border-radius: 14px; padding: 1.5rem; text-align: center;
      margin-top: 1.25rem; display: none; animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }
    .win-card.show { display: block; }
    @keyframes popIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
    .win-icon { font-size: 2rem; margin-bottom: 0.5rem; }
    .win-title { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 800; color: white; margin-bottom: 0.25rem; }
    .win-body { font-size: 0.88rem; color: rgba(255,255,255,0.85); }
  </style>
</head>
<body>

  <div class="checklist-wrap">
    <div class="progress-header">
      <span class="progress-label">Progress</span>
      <span class="progress-count" id="progressCount">0 / 5</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width: 0%"></div>
    </div>

    <div class="checklist" id="checklist"></div>
    <div class="win-card" id="winCard">
      <div class="win-icon">🎉</div>
      <div class="win-title">Setup Complete!</div>
      <div class="win-body">All required steps are done. You're ready to start building.</div>
    </div>
  </div>

  <script>
    const items = [
      { id: 1, title: 'Install dependencies', desc: 'Run npm install to get all packages', req: true },
      { id: 2, title: 'Configure environment', desc: 'Set up your .env file with API keys', req: true },
      { id: 3, title: 'Start the server', desc: 'Run npm start or node server.js', req: true },
      { id: 4, title: 'Test the connection', desc: 'Send a test request to verify setup', req: true },
      { id: 5, title: 'Read the docs', desc: 'Browse the API reference for advanced usage', req: false }
    ];

    const state = {};

    function render() {
      const list = document.getElementById('checklist');
      list.innerHTML = items.map(item => `
        <div class="check-row ${state[item.id] ? 'checked' : ''}" onclick="toggle(${item.id})">
          <div class="check-box"><span class="check-mark">✓</span></div>
          <div class="check-content">
            <div class="check-title">${item.title}</div>
            <div class="check-desc">${item.desc}</div>
          </div>
          <span class="check-badge ${item.req ? 'badge-req' : 'badge-opt'}">${item.req ? 'req' : 'opt'}</span>
        </div>
      `).join('');

      const checked = Object.values(state).filter(Boolean).length;
      const total = items.length;
      document.getElementById('progressCount').textContent = `${checked} / ${total}`;
      document.getElementById('progressFill').style.width = (checked / total * 100) + '%';

      const requiredDone = items.filter(i => i.req).every(i => state[i.id]);
      document.getElementById('winCard').classList.toggle('show', requiredDone);
    }

    function toggle(id) {
      state[id] = !state[id];
      render();
    }

    render();
  </script>
</body>
</html>
